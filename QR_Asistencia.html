<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Control de Asistencia</title>
  
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .content {
      padding: 30px 20px;
    }
    
    .loader {
      text-align: center;
      padding: 40px 20px;
    }
    
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .status-card {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    
    .status-icon {
      font-size: 64px;
      margin-bottom: 15px;
    }
    
    .status-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #1a1a1a;
    }
    
    .status-message {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    
    .info-box {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      font-size: 11px;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .info-value {
      font-size: 14px;
      color: #1a1a1a;
      font-weight: 700;
      text-align: right;
      max-width: 60%;
      word-break: break-word;
    }
    
    .footer {
      background: #f8f9fa;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #e0e0e0;
    }
    
    .footer p {
      font-size: 11px;
      color: #999;
    }
    
    .debug-info {
      background: #1a1a1a;
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .warning { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="material-icons-round" style="font-size: 60px;">event_available</span>
      <h1>Control de Asistencia</h1>
      <p>Sindicato SLIM n°3</p>
    </div>
    
    <div class="content" id="content-area">
      <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="color: #666; font-size: 14px;" id="loader-text">Verificando asistencia...</p>
      </div>
      
      <div id="result" style="display: none;"></div>
      <div id="debug" class="debug-info"></div>
    </div>
    
    <div class="footer">
      <p>Sistema de Registro de Asistencia QR</p>
      <p style="font-size: 9px; margin-top: 5px; color: #ccc;" onclick="toggleDebug()">v1.1</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'qr_access_rut';
    const params = <?!= JSON.stringify(params) ?>;
    let timeoutId;
    let debugMode = false;
    
    // ==========================================
    // FUNCIÓN DE DEBUG
    // ==========================================
    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString('es-CL');
      const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
      const logMessage = `[${timestamp}] ${prefix} ${message}`;
      
      console.log(logMessage);
      
      const debugDiv = document.getElementById('debug');
      debugDiv.innerHTML += logMessage + '\n';
      debugDiv.scrollTop = debugDiv.scrollHeight;
    }
    
    function toggleDebug() {
      debugMode = !debugMode;
      document.getElementById('debug').style.display = debugMode ? 'block' : 'none';
    }
    
    // ==========================================
    // INICIALIZACIÓN
    // ==========================================
    window.onload = function() {
      log('═══════════════════════════════════════');
      log('🔵 INICIO DE SISTEMA DE ASISTENCIA');
      log('═══════════════════════════════════════');
      
      const rutUsuario = localStorage.getItem(STORAGE_KEY);
      const nombreControl = params.control || params.asamblea || ''; // Soporta ambos parámetros
      const action = params.action || '';
      
      log('📱 Datos del dispositivo:');
      log('   - RUT en localStorage: ' + (rutUsuario || 'NO ENCONTRADO'));
      log('   - Parámetro action: ' + (action || 'NO DEFINIDO'));
      log('   - Parámetro control: ' + (nombreControl || 'NO DEFINIDO'));
      log('   - Todos los params: ' + JSON.stringify(params));
      
      // ==========================================
      // VALIDACIÓN 1: RUT EN LOCALSTORAGE
      // ==========================================
      if (!rutUsuario || rutUsuario.trim() === '') {
        log('❌ VALIDACIÓN FALLIDA: No hay RUT en localStorage', 'error');
        clearTimeout(timeoutId);
        mostrarError(
          'Dispositivo No Vinculado',
          'No se encontró información de vinculación en este dispositivo. Debes escanear tu código QR personal para vincular el dispositivo antes de registrar asistencia.'
        );
        return;
      }
      
      log('✅ RUT encontrado: ' + rutUsuario, 'success');
      
      // ==========================================
      // VALIDACIÓN 2: PARÁMETRO DE CONTROL
      // ==========================================
      if (!nombreControl || nombreControl.trim() === '') {
        log('❌ VALIDACIÓN FALLIDA: No viene parámetro de control', 'error');
        clearTimeout(timeoutId);
        mostrarError(
          'QR Inválido',
          'Este código QR no contiene información válida del punto de control. Parámetros recibidos: ' + JSON.stringify(params)
        );
        return;
      }
      
      log('✅ Punto de control: ' + nombreControl, 'success');
      
      // ==========================================
      // VALIDACIÓN 3: ACTION (OPCIONAL)
      // ==========================================
      if (action && action !== 'checkin') {
        log('⚠️ ADVERTENCIA: Action no es checkin: ' + action, 'warning');
      }
      
      log('🔄 Iniciando registro de asistencia...');
      
      // ==========================================
      // TIMEOUT DE SEGURIDAD (30 segundos)
      // ==========================================
      timeoutId = setTimeout(function() {
        log('❌ TIMEOUT: No hubo respuesta del servidor en 30s', 'error');
        document.getElementById('loader').style.display = 'none';
        mostrarError(
          'Tiempo de Espera Agotado',
          'El servidor no respondió a tiempo. Por favor, verifica tu conexión a internet e intenta nuevamente.'
        );
      }, 30000);
      
      // ==========================================
      // LLAMAR AL BACKEND
      // ==========================================
      registrarAsistencia(rutUsuario, nombreControl);
    };
    
    // ==========================================
    // FUNCIÓN PRINCIPAL DE REGISTRO
    // ==========================================
    function registrarAsistencia(rut, control) {
      log('🚀 Llamando al backend...');
      log('   - RUT: ' + rut);
      log('   - Control: ' + control);
      
      document.getElementById('loader-text').innerText = 'Conectando con el servidor...';
      
      try {
        google.script.run
          .withSuccessHandler(function(response) {
            clearTimeout(timeoutId);
            log('✅ Respuesta recibida del backend:', 'success');
            log('   - Contenido: ' + JSON.stringify(response));
            
            document.getElementById('loader').style.display = 'none';
            
            if (response.success) {
              log('✅ ASISTENCIA REGISTRADA EXITOSAMENTE', 'success');
              mostrarExito(response);
            } else {
              log('⚠️ El backend rechazó el registro: ' + response.message, 'warning');
              if (response.yaRegistrado) {
                mostrarAdvertencia(response.message);
              } else {
                mostrarError('Error de Validación', response.message);
              }
            }
          })
          .withFailureHandler(function(error) {
            clearTimeout(timeoutId);
            log('❌ ERROR DE CONEXIÓN CON EL BACKEND', 'error');
            log('   - Error: ' + error.message || error.toString());
            
            document.getElementById('loader').style.display = 'none';
            mostrarError(
              'Error de Conexión', 
              'No se pudo conectar con el servidor. Detalles: ' + (error.message || error.toString())
            );
          })
          .registrarAsistencia(rut, control);
          
        log('📡 Solicitud enviada al backend');
        
      } catch (e) {
        clearTimeout(timeoutId);
        log('❌ EXCEPCIÓN AL LLAMAR AL BACKEND: ' + e.toString(), 'error');
        document.getElementById('loader').style.display = 'none';
        mostrarError('Error Crítico', 'Error al ejecutar la función: ' + e.toString());
      }
    }
    
    // ==========================================
    // FUNCIONES DE VISUALIZACIÓN
    // ==========================================
    function mostrarExito(data) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `
        <div class="status-card">
          <div class="status-icon success">
            <span class="material-icons-round" style="font-size: 64px;">check_circle</span>
          </div>
          <div class="status-title">¡Asistencia Registrada!</div>
          <div class="status-message">Tu asistencia ha sido registrada exitosamente.</div>
          
          <div class="info-box">
            <div class="info-row">
              <span class="info-label">Nombre</span>
              <span class="info-value">${data.nombre}</span>
            </div>
            <div class="info-row">
              <span class="info-label">RUT</span>
              <span class="info-value">${formatRut(data.rut)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Actividad</span>
              <span class="info-value">${data.asamblea}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Fecha/Hora</span>
              <span class="info-value">${data.fecha}</span>
            </div>
          </div>
        </div>
      `;
      resultDiv.style.display = 'block';
    }
    
    function mostrarError(titulo, mensaje) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `
        <div class="status-card">
          <div class="status-icon error">
            <span class="material-icons-round" style="font-size: 64px;">error</span>
          </div>
          <div class="status-title">${titulo}</div>
          <div class="status-message">${mensaje}</div>
          <button onclick="toggleDebug()" style="margin-top: 15px; padding: 8px 16px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 12px; cursor: pointer;">
            Ver detalles técnicos
          </button>
        </div>
      `;
      resultDiv.style.display = 'block';
    }
    
    function mostrarAdvertencia(mensaje) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `
        <div class="status-card">
          <div class="status-icon warning">
            <span class="material-icons-round" style="font-size: 64px;">warning</span>
          </div>
          <div class="status-title">Ya Registrado</div>
          <div class="status-message">${mensaje}</div>
        </div>
      `;
      resultDiv.style.display = 'block';
    }
    
    function formatRut(rut) {
      if (!rut) return '';
      const cleaned = rut.replace(/\./g, '').replace(/-/g, '');
      const dv = cleaned.slice(-1);
      const numero = cleaned.slice(0, -1);
      return numero.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '-' + dv;
    }
  </script>
</body>
</html>
